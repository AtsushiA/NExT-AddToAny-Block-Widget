name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  phpcs:
    name: phpcs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer
      - run: composer install --no-interaction
      - run: composer run phpcs

  phpunit:
    name: "PHPUnit (WP ${{ matrix.wp }} / PHP ${{ matrix.php }})"
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          # MySQL サービスが空の wordpress_test DB を作成する。
          # install-wp-tests.sh は第6引数 true で DB 作成をスキップ（SKIP_DB_CREATE=true なら
          # 既存 DB チェック前に return するため read -p のプロンプトには到達しない）。
          MYSQL_DATABASE: wordpress_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    strategy:
      fail-fast: false
      matrix:
        include:
          - wp: latest
            php: '8.3'
          - wp: latest
            php: '8.4'
          - wp: '6.8'
            php: '8.3'
          - wp: '6.8'
            php: '8.4'
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: composer
          extensions: mysqli
      - name: Install Composer dependencies
        run: composer install --no-interaction
      - name: Install WordPress test suite
        # 引数: <db-name> <db-user> <db-pass> <db-host> <wp-version> <skip-db-create>
        run: bash bin/install-wp-tests.sh wordpress_test root root 127.0.0.1 ${{ matrix.wp }} true
      - name: Run PHPUnit
        env:
          WP_TESTS_DIR: /tmp/wordpress-tests-lib
        run: vendor/bin/phpunit --bootstrap tests/phpunit/bootstrap.php

  plugin-check:
    name: Plugin Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: wordpress/plugin-check-action@v1
        with:
          # チェックアウト先ディレクトリ名（= リポジトリ名 NExT-AddToAny-Block-Widget）ではなく、
          # 実際のプラグイン slug を指定する。これでテキストドメイン等の slug 連動チェックが正しく評価される。
          slug: next-addtoany-block
          # vendor / tests / node_modules は本番プラグインに含まれないため除外する。
          exclude-directories: 'vendor,tests,node_modules'
          # wp.org へ公開しないプラグインのため plugin_repo カテゴリは除外し、警告は無視する。
          categories: |
            general
            performance
            accessibility
            security
          ignore-warnings: true
